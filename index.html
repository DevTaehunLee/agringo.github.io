<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agringo</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f6fff0;
}

header{
    background:#58CC02;
    color:white;
    padding:20px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.progress-container{
    width:300px;
    background:#ddd;
    height:20px;
    border-radius:20px;
    overflow:hidden;
}

.progress{
    width:0%;
    height:100%;
    background:white;
    transition:.5s;
}

.container{
    max-width:800px;
    margin:auto;
    padding:40px;
}

.card{
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.question{
    font-size:1.5rem;
    margin-bottom:30px;
}

.answer{
    display:block;
    width:100%;
    padding:15px;
    margin:10px 0;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:#f2f2f2;
    font-size:1rem;
}

.answer:hover{
    background:#e6e6e6;
}

.stats{
    margin-top:20px;
    display:flex;
    gap:20px;
    font-weight:bold;
}

.correct{
    background:#8be28b !important;
}

.wrong{
    background:#ff8f8f !important;
}

.finish{
    text-align:center;
}

</style>
</head>
<body>

<header>

<div class="topbar">

<div>
<h2>🌱 AGRINGO</h2>
</div>

<div class="progress-container">
<div class="progress" id="progress"></div>
</div>

</div>

</header>

<div class="container">

<div class="card" id="quizCard">

<h2 id="level">Level 1 Farmer</h2>

<div class="stats">
<div>⭐ XP: <span id="xp">0</span></div>
<div>❤️ Lives: <span id="lives">5</span></div>
</div>

<br>

<div class="question" id="question"></div>

<div id="answers"></div>

</div>

</div>

<script>

const questions = [

{
question:"What do plants need most to grow?",
answers:["Plastic","Water","Metal","Sand"],
correct:1
},

{
question:"Which crop grows underground?",
answers:["Corn","Potato","Rice","Tomato"],
correct:1
},

{
question:"What is used to water crops?",
answers:["Irrigation","Battery","Plastic","Concrete"],
correct:0
},

{
question:"Which is a fruit?",
answers:["Potato","Tomato","Stone","Rice"],
correct:1
},

{
question:"Why is soil important?",
answers:[
"It supports plant growth",
"It makes music",
"It creates electricity",
"It cooks food"
],
correct:0
}

];

let currentQuestion=0;
let xp=0;
let lives=5;

const questionEl=document.getElementById("question");
const answersEl=document.getElementById("answers");

function loadQuestion(){

if(currentQuestion>=questions.length){

showFinish();
return;

}

const q=questions[currentQuestion];

questionEl.innerText=q.question;

answersEl.innerHTML="";

q.answers.forEach((answer,index)=>{

const btn=document.createElement("button");

btn.className="answer";
btn.innerText=answer;

btn.onclick=()=>checkAnswer(index);

answersEl.appendChild(btn);

});

updateProgress();

}

function checkAnswer(selected){

const q=questions[currentQuestion];

const buttons=document.querySelectorAll(".answer");

if(selected===q.correct){

buttons[selected].classList.add("correct");

xp+=10;

}else{

buttons[selected].classList.add("wrong");

buttons[q.correct].classList.add("correct");

lives--;

}

document.getElementById("xp").innerText=xp;
document.getElementById("lives").innerText=lives;

const level=Math.floor(xp/30)+1;

document.getElementById("level").innerText=
"Level "+level+" Farmer";

if(lives<=0){

showGameOver();
return;

}

setTimeout(()=>{

currentQuestion++;
loadQuestion();

},1000);

}

function updateProgress(){

const percent=
(currentQuestion/questions.length)*100;

document.getElementById("progress").style.width=
percent+"%";

}

function showFinish(){

document.getElementById("quizCard").innerHTML=`

<div class="finish">

<h1>🎉 Harvest Complete!</h1>

<h2>Final XP: ${xp}</h2>

<p>You completed the Agringo lesson.</p>

<button onclick="location.reload()"
class="answer">

Play Again

</button>

</div>

`;

document.getElementById("progress").style.width="100%";

}

function showGameOver(){

document.getElementById("quizCard").innerHTML=`

<div class="finish">

<h1>💀 Farm Failed</h1>

<h2>Out of Lives</h2>

<button onclick="location.reload()"
class="answer">

Try Again

</button>

</div>

`;

}

loadQuestion();

</script>

</body>
</html>
